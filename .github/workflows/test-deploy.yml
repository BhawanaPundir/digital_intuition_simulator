name: Test & Deploy

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest flask-testing
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 app.py progress_tracker.py --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Run basic tests
      run: |
        python -c "import app; print('✅ App imports successfully')"
        python -c "from progress_tracker import load_progress, save_progress; print('✅ Progress tracker works')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Heroku
      uses: akhileshns/heroku-deploy@v3.13.15
      with:
        heroku_api_key: ${{secrets.HEROKU_API_KEY}}
        heroku_app_name: ${{secrets.HEROKU_APP_NAME}}
        heroku_email: ${{secrets.HEROKU_EMAIL}}
      env:
        HD_SECRET_KEY: ${{secrets.SECRET_KEY}}
