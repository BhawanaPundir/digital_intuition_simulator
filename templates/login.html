<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Digital Intuition Simulator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .login-container { max-width:400px; margin:80px auto; padding:20px; background:#fff; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .login-container h1 { text-align:center; }
    .form-group { margin:12px 0; }
    .form-group label { display:block; margin-bottom:4px; font-weight:bold; }
    .form-group input { width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; }
    .login-container .btn { width:100%; }
    .error { color:#d32f2f; background:#ffebee; padding:8px; border-radius:4px; margin:8px 0; }
    .info { color:#1976d2; background:#e3f2fd; padding:8px; border-radius:4px; margin:8px 0; }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Admin Login</h1>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <div class="info">
      <strong>Demo Credentials:</strong><br>
      Username: <code>admin</code><br>
      Password: <code>admin123</code>
    </div>
    <form method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn">Login</button>
    </form>
    <p style="text-align:center;margin-top:16px">
      <a href="/">Back to Home</a>
    </p>
  </div>
</body>
</html>
